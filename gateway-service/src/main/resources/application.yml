spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        corsConfigurations:
          '[/**]':
            # In production, always scope this to explicit frontend origins.
            # For local development, you can override GATEWAY_ALLOWED_ORIGINS via environment.
            allowedOrigins: ${GATEWAY_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            # We rely on Authorization headers instead of cookies, so credentials are not required.
            allowCredentials: false

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    preferIpAddress: false

jwt:
  # Secret can be overridden via environment: JWT_SECRET
  secret: ${JWT_SECRET:shailesh-secret-key-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.shailesh: DEBUG
    org.springframework.cloud.gateway: DEBUG
