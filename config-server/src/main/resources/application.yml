spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: file://${java.io.tmpdir}/config-repo
          default-label: main
          basedir: /tmp/config-server-repo
      enabled: true

server:
  port: 8888

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
